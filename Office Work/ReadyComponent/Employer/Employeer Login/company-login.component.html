<div class="container">
  <h2>Login Company</h2>

  <form (ngSubmit)="login()" #form="ngForm">


    <div class="form-group">
      <label>Employer Email</label>
      <input 
        type="email" 
        name="email" 
        [(ngModel)]="employer.email" 
        required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input 
        type="password" 
        name="password" 
        [(ngModel)]="employer.password" 
        required minlength="6">
    </div>

    <button type="submit" [disabled]="form.invalid">
      Login
    </button>

  </form>
</div>
