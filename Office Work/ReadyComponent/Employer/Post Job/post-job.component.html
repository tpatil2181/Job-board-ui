<div class="container">
  <h2>Post a Job</h2>

  <form class="form-grid" (ngSubmit)="submitJob()">

    <div class="form-group">
      <label>Job Title</label>
      <input [(ngModel)]="job.jobTitle" name="jobTitle">
    </div>

    <div class="form-group">
      <label>Company</label>
      <input [(ngModel)]="job.company" name="company">
    </div>

    <div class="form-group">
      <label>Location</label>
      <input [(ngModel)]="job.location" name="location">
    </div>

    <div class="form-group">
      <label>Experience Required</label>
      <input [(ngModel)]="job.experience" name="experience">
    </div>

    <div class="form-group">
      <label>Work Mode</label>
      <input [(ngModel)]="job.workmode" name="workmode">
    </div>

    <div class="form-group">
      <label>Number of Openings</label>
      <input [(ngModel)]="job.openings" name="openings">
    </div>

    <div class="form-group">
      <label>Salary From</label>
      <input [(ngModel)]="job.salaryFrom" name="salaryFrom">
    </div>

    <div class="form-group">
      <label>Salary To</label>
      <input [(ngModel)]="job.salaryTo" name="salaryTo">
    </div>

    <div class="form-group full">
      <label>Job Description</label>
      <input [(ngModel)]="job.description" name="description">
    </div>

    <div class="form-group">
      <label>Role</label>
      <input [(ngModel)]="job.role" name="role">
    </div>

    <div class="form-group">
      <label>Department</label>
      <input [(ngModel)]="job.department" name="department">
    </div>

    <div class="form-group">
      <label>Industry Type</label>
      <input [(ngModel)]="job.industry" name="industry">
    </div>

    <div class="form-group">
      <label>Employment Type</label>
      <input [(ngModel)]="job.employmentType" name="employmentType">
    </div>

    <div class="form-group">
      <label>Role Category</label>
      <input [(ngModel)]="job.roleCategory" name="roleCategory">
    </div>

    <!-- Education -->
    <div class="form-group full">
      <label>Education</label>
      <div class="button-row">
        <input [(ngModel)]="educationInput" name="educationInput">
        <button type="button" class="secondary" (click)="addEducation()">Add</button>
      </div>

      <div>
        <span *ngFor="let edu of job.education">• {{edu}} </span>
      </div>
    </div>

    <!-- Skills -->
    <div class="form-group full">
      <label>Skills</label>
      <div class="button-row">
        <input [(ngModel)]="skillInput" name="skillInput">
        <button type="button" class="secondary" (click)="addSkill()">Add</button>
      </div>

      <div>
        <span *ngFor="let skill of job.skills">• {{skill}} </span>
      </div>
    </div>

    <div class="form-group full">
      <button type="submit">Post Job</button>
    </div>

  </form>
</div>
